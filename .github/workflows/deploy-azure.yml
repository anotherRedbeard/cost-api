name: Deploy Azure Cost API

on:
  workflow_dispatch:
    inputs:
      azure_resource_group:
        description: Azure resource group name to provision into
        required: true
        default: costdemo-red-rg
      azure_location:
        description: Azure region for infrastructure
        required: true
        default: eastus2

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AZD_ENV_NAME: costdemo
      AZURE_RESOURCE_GROUP: ${{ inputs.azure_resource_group }}
      AZURE_LOCATION: ${{ inputs.azure_location }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      PYTHON_BIN: python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Azure Developer CLI
        uses: Azure/setup-azd@v2

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Use Azure CLI auth for azd
        run: azd config set auth.useAzCliAuth true

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Provision infrastructure
        run: ./scripts/provision-infra.sh

      - name: Package Function App
        run: ./scripts/package-function-code.sh

      - name: Deploy Function App code
        run: ./scripts/deploy-function-code.sh

      - name: Configure runtime app settings
        env:
          TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: ./scripts/configure-function-settings.sh

      - name: Grant Cost Management Reader
        run: ./scripts/assign-cost-reader.sh

      - name: Smoke test deployment
        run: ./scripts/smoke-test.sh
